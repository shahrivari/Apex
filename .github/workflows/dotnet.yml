# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Verify formatting
      run: |
        dotnet format whitespace src --folder --exclude '**/obj/**' '**/bin/**' --verify-no-changes
        dotnet format whitespace tests --folder --exclude '**/obj/**' '**/bin/**' --verify-no-changes
        dotnet format whitespace tools --folder --exclude '**/obj/**' '**/bin/**' --verify-no-changes
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Architecture and unit tests
      run: |
        dotnet test tests/Apex.ArchitectureTests/Apex.ArchitectureTests.csproj --no-build --verbosity normal
        dotnet test tests/Apex.UnitTests/Apex.UnitTests.csproj --no-build --verbosity normal
    - name: Integration tests
      run: dotnet test tests/Apex.IntegrationTests/Apex.IntegrationTests.csproj --no-build --verbosity normal
